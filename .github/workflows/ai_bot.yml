name: Run AI Bot Daily

on:
  schedule:
    - cron: '0 9 * * *' # يعمل يومياً الساعة 9 صباحاً
  workflow_dispatch: # يتيح لك تشغيله يدوياً من زر في GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install groq PyGithub

      - name: Run bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python smart_bot.py
